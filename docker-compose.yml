services:
  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    healthcheck:
      test: /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    hostname: redis
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  tsdb-server:
    build:
      context: .
      dockerfile: tsdb-server/Dockerfile
    hostname: tsdb-server
    container_name: tsdb-server
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SPRING_DATA_REDIS_HOST: redis
    volumes:
      - tsdb-data:/data/tsdb
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  metrics-collector:
    build:
      context: .
      dockerfile: metrics-collector/Dockerfile
    hostname: metrics-collector
    container_name: metrics-collector
    ports:
      - "8082:8082"
    depends_on:
      kafka:
        condition: service_healthy
      tsdb-server:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  kafka-consumer:
    build:
      context: .
      dockerfile: kafka-consumer/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      tsdb-server:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONSUMER_TSDB_WRITE_URL: http://tsdb-server:8080/api/v1/write
    deploy:
      replicas: 2

  grafana:
    image: grafana/grafana:11.0.0
    hostname: grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      tsdb-server:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning

  load-client:
    build:
      context: .
      dockerfile: load-client/Dockerfile
    hostname: load-client
    container_name: load-client
    ports:
      - "8081:8081"
    profiles:
      - test
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  tsdb-data:
